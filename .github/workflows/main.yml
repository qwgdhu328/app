name: Build and Archive iOS

on:
  push:
    branches: [ main ]

env:
  SCHEME: BenessereBot
  PROJECT: BenessereBot.xcodeproj

jobs:
  build_device:
    name: Build Device IPA
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --project .

      - name: Build for Device (Release)
        run: |
          xcodebuild clean build \
            -project "${{ env.PROJECT }}" \
            -scheme "${{ env.SCHEME }}" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SYMROOT="$PWD/build"
        env:
          EXPO_PUBLIC_OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          EXPO_PUBLIC_OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}

      - name: Create unsigned IPA
        run: |
          APP_PATH=$(find "$PWD/build" -name "*.app" -type d | head -1)
          mkdir -p build/ipa/Payload
          cp -r "$APP_PATH" build/ipa/Payload/
          cd build/ipa
          zip -r "${{ env.SCHEME }}.ipa" Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iOS-App
          path: build/ipa/*.ipa

  build_simulator:
    name: Build Simulator .app (for Appetize.io)
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --project .

      - name: Build for Simulator (Debug)
        run: |
          xcodebuild clean build \
            -project "${{ env.PROJECT }}" \
            -scheme "${{ env.SCHEME }}" \
            -configuration Debug \
            -sdk iphonesimulator \
            -arch arm64 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SYMROOT="$PWD/build-sim"
        env:
          EXPO_PUBLIC_OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          EXPO_PUBLIC_OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}

      - name: Upload Simulator .app
        uses: actions/upload-artifact@v4
        with:
          name: iOS-App-Simulator
          path: build-sim/**/BenessereBot.app
          compression-level: 6
