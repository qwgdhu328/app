name: Build and Archive iOS

on:
  push:
    branches: [ main ]

env:
  SCHEME: BenessereBot
  PROJECT: BenessereBot.xcodeproj

jobs:
  build_device:
    name: Build Device IPA
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --project .

      - name: Build for Device (Release)
        run: |
          set -o pipefail
          xcodebuild clean build \
            -project "${{ env.PROJECT }}" \
            -scheme "${{ env.SCHEME }}" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SYMROOT="$PWD/build" 2>&1 | tee build_device.log
          exit ${PIPESTATUS[0]}
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}

      - name: Show Xcode errors
        if: failure()
        run: |
          echo "=== BUILD ERRORS ==="
          grep -n "error:" build_device.log 2>/dev/null | head -50
          echo "=== LAST 50 LINES ==="
          tail -50 build_device.log 2>/dev/null
          echo "=== FULL ERROR LIST ==="
          grep -n "error:" build_device.log 2>/dev/null
          echo "=== END ==="

      - name: Upload build log (Device)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-device
          path: build_device.log

      - name: Create unsigned IPA
        run: |
          APP_PATH=$(find "$PWD/build" -name "*.app" -type d | head -1)
          mkdir -p build/ipa/Payload
          cp -r "$APP_PATH" build/ipa/Payload/
          cd build/ipa
          zip -r "${{ env.SCHEME }}.ipa" Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iOS-App
          path: build/ipa/*.ipa

  build_simulator:
    name: Build Simulator .app (for Appetize.io)
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --project .

      - name: Build for Simulator (Debug)
        run: |
          set -o pipefail
          xcodebuild clean build \
            -project "${{ env.PROJECT }}" \
            -scheme "${{ env.SCHEME }}" \
            -configuration Debug \
            -sdk iphonesimulator \
            -arch arm64 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SYMROOT="$PWD/build-sim" 2>&1 | tee build_sim.log
          # Exit with xcodebuild status (tee hides it)
          exit ${PIPESTATUS[0]}
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}

      - name: Show Xcode errors
        if: failure()
        run: |
          echo "=== BUILD ERRORS ==="
          grep -n "error:" build_sim.log 2>/dev/null | head -50
          echo "=== LAST 50 LINES ==="
          tail -50 build_sim.log 2>/dev/null

      - name: Upload build log (Simulator)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-simulator
          path: build_sim.log

      - name: Upload Simulator .app (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: iOS-App-Simulator
          path: build-sim/**/BenessereBot.app
          compression-level: 6

      - name: Zip .app for Appetize
        run: |
          APP_PATH=$(find "$PWD/build-sim" -name "*.app" -type d | head -1)
          cd "$(dirname "$APP_PATH")"
          zip -r "${{ env.SCHEME }}-simulator.zip" "$(basename "$APP_PATH")"
          echo "ZIP_PATH=$(pwd)/${{ env.SCHEME }}-simulator.zip" >> $GITHUB_ENV

      - name: Upload to Appetize.io
        env:
          APPETIZE_TOKEN: ${{ secrets.APPETIZE_TOKEN }}
        run: |
          if [ -z "$APPETIZE_TOKEN" ]; then
            echo "⚠️ APPETIZE_TOKEN not set — skipping upload"
            exit 0
          fi
          echo "Uploading to Appetize.io..."
          RESPONSE=$(curl -s -X POST https://api.appetize.io/v1/apps \
            -u "$APPETIZE_TOKEN:" \
            -F "file=@$ZIP_PATH" \
            -F "platform=ios")
          echo "Response: $RESPONSE"
          PUBLIC_KEY=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('publicKey',''))" 2>/dev/null || echo "")
          if [ -n "$PUBLIC_KEY" ]; then
            echo "✅ App uploaded to https://appetize.io/app/$PUBLIC_KEY"
            echo "Appetize URL: https://appetize.io/app/$PUBLIC_KEY" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Upload failed: $RESPONSE"
          fi
