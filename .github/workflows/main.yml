name: Build and Archive iOS

on:
  push:
    branches: [ main ]

env:
  SCHEME: BenessereBot

jobs:
  build_with_xcode:
    name: Build and Archive iOS App
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Expo prebuild
        run: npx expo prebuild --platform ios --no-install

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ hashFiles('ios/Podfile.lock') }}

      - name: Install Pods
        run: pod install --project-directory=ios

      - name: Build Project
        run: |
          xcodebuild clean archive \
            -workspace "ios/${{ env.SCHEME }}.xcworkspace" \
            -scheme "${{ env.SCHEME }}" \
            -configuration Release \
            -archivePath "$PWD/build/${{ env.SCHEME }}.xcarchive" \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
        env:
          EXPO_PUBLIC_OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          EXPO_PUBLIC_OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}

      - name: Debug bundle contents
        run: |
          APP_PATH=$(find "build/${{ env.SCHEME }}.xcarchive" -name "*.app" -type d | head -1)
          echo "App found at: $APP_PATH"
          ls -la "$APP_PATH/"
          find "$APP_PATH" -name "*.jsbundle" -o -name "*.hbc" | head -5
          find "$APP_PATH" -name "main.jsbundle" -exec ls -la {} \;

      - name: Create unsigned IPA
        run: |
          APP_PATH=$(find "build/${{ env.SCHEME }}.xcarchive" -name "*.app" -type d | head -1)
          mkdir -p build/ipa/Payload
          cp -r "$APP_PATH" build/ipa/Payload/
          cd build/ipa
          zip -r "${{ env.SCHEME }}.ipa" Payload/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOS-App
          path: build/ipa/*.ipa
