name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  SCHEME: BenessereBot

jobs:
  build:
    name: Build IPA
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --project .

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Inject API key into Info.plist
        run: |
          /usr/libexec/PlistBuddy -c "Add OPENROUTER_API_KEY string ${{ secrets.OPENROUTER_API_KEY }}" BenessereBot/Info.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set OPENROUTER_API_KEY ${{ secrets.OPENROUTER_API_KEY }}" BenessereBot/Info.plist

      - name: Build unsigned IPA
        run: |
          set -o pipefail
          xcodebuild clean build \
            -project "${{ env.SCHEME }}.xcodeproj" \
            -scheme "${{ env.SCHEME }}" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SYMROOT="$PWD/build" 2>&1 | tee build.log
          exit ${PIPESTATUS[0]}

      - name: Show build errors
        if: failure()
        run: |
          echo "=== ERRORS ==="
          grep -n "error:" build.log | head -50 || true
          echo "=== TAIL ==="
          tail -30 build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Package IPA
        run: |
          APP_PATH=$(find "$PWD/build" -name "*.app" -type d | head -1)
          mkdir -p build/ipa/Payload
          cp -r "$APP_PATH" build/ipa/Payload/
          cd build/ipa
          zip -r "${{ env.SCHEME }}.ipa" Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: BenessereBot-IPA
          path: build/ipa/*.ipa
