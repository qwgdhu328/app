name: BenessereBot
options:
  bundleIdPrefix: com.benesserebot
  deploymentTarget:
    iOS: "18.0"
settings:
  SWIFT_VERSION: "5.0"
targets:
  BenessereBot:
    type: application
    platform: iOS
    sources:
      - path: BenessereBot
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.benesserebot.app
      INFOPLIST_FILE: BenessereBot/Info.plist
      DEVELOPMENT_TEAM: ""
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: ""
      CODE_SIGNING_REQUIRED: NO
      CODE_SIGNING_ALLOWED: NO