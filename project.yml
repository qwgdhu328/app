name: BenessereBot
options:
  bundleIdPrefix: com.benesserebot
  deploymentTarget:
    iOS: "17.0"
settings:
  SWIFT_VERSION: "5.9"
targets:
  BenessereBot:
    type: application
    platform: iOS
    sources:
      - path: BenessereBot
      - path: BenessereBot/Assets.xcassets
    dependencies:
      - target: BenessereBotWidget
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.benesserebot.app
      INFOPLIST_FILE: BenessereBot/Info.plist
      DEVELOPMENT_TEAM: ""
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: ""
      CODE_SIGNING_REQUIRED: NO
      CODE_SIGNING_ALLOWED: NO
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      GENERATE_INFOPLIST_FILE: NO
  BenessereBotWidget:
    type: extension
    platform: iOS
    sources:
      - path: BenessereBotWidget
      - path: BenessereBot/Models/ReminderActivityAttributes.swift
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.benesserebot.app.widget
      INFOPLIST_FILE: BenessereBotWidget/Info.plist
      DEVELOPMENT_TEAM: ""
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: ""
      CODE_SIGNING_REQUIRED: NO
      CODE_SIGNING_ALLOWED: NO
      GENERATE_INFOPLIST_FILE: NO
