name: BenessereBot
options:
  bundleIdPrefix: com.benesserebot
  deploymentTarget:
    iOS: "17.0"
settings:
  SWIFT_VERSION: "5.0"
packages:
  SwiftLlama:
    url: https://github.com/pgorzelany/swift-llama-cpp
    branch: main
targets:
  BenessereBot:
    type: application
    platform: iOS
    sources:
      - path: BenessereBot
      - path: BenessereBot/PrivacyInfo.xcprivacy
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.benesserebot.app
      INFOPLIST_FILE: BenessereBot/Info.plist
      DEVELOPMENT_TEAM: ""
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: ""
      CODE_SIGNING_REQUIRED: NO
      CODE_SIGNING_ALLOWED: NO
    dependencies:
      - target: BreathingWidget
      - package: SwiftLlama
        product: SwiftLlama

  BreathingWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: BreathingWidget
      - path: BenessereBot/Services/BreathingActivityAttributes.swift
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.benesserebot.app.BreathingWidget
      INFOPLIST_FILE: BreathingWidget/Info.plist
      DEVELOPMENT_TEAM: ""
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: ""
      CODE_SIGNING_REQUIRED: NO
      CODE_SIGNING_ALLOWED: NO