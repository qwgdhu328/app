name: BenessereBot
options:
  bundleIdPrefix: com.benesserebot
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
settings:
  SWIFT_VERSION: "5.9"
targets:
  BenessereBot:
    type: application
    platform: iOS
    sources:
      - path: BenessereBot
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.benesserebot.app
      INFOPLIST_FILE: BenessereBot/Info.plist
      DEVELOPMENT_TEAM: ""
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: ""
      CODE_SIGNING_REQUIRED: NO
      CODE_SIGNING_ALLOWED: NO
    info:
      path: BenessereBot/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSupportsIndirectInputEvents: true
        CFBundleDisplayName: BenessereBot
